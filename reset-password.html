<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Reset – RM Tutoring</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>RM Tutoring</h1>
    </div>

    <!-- Step 1: request reset email -->
    <div id="requestView" class="card">
      <div class="card-header"><h2>Forgot your password?</h2></div>
      <div class="card-body">
        <p class="text-muted text-sm mb-4">Enter your account email and we'll send you a reset link.</p>
        <div id="reqAlert" class="alert hidden"></div>
        <form id="requestForm" novalidate>
          <div class="form-group">
            <label for="reqEmail">Email address</label>
            <input id="reqEmail" type="email" class="form-input" placeholder="you@example.com" required autocomplete="email" />
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="reqBtn">Send Reset Link</button>
        </form>
      </div>
    </div>

    <!-- Step 2: enter new password (shown after clicking email link) -->
    <div id="resetView" class="card hidden">
      <div class="card-header"><h2>Set a new password</h2></div>
      <div class="card-body">
        <div id="resetAlert" class="alert hidden"></div>
        <form id="resetForm" novalidate>
          <div class="form-group">
            <label for="newPwd">New password</label>
            <input id="newPwd" type="password" class="form-input" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password" />
          </div>
          <div class="form-group">
            <label for="confirmPwd">Confirm new password</label>
            <input id="confirmPwd" type="password" class="form-input" placeholder="Repeat password" required autocomplete="new-password" />
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="resetBtn">Update Password</button>
        </form>
      </div>
    </div>

    <div class="auth-links"><a href="/login.html">&larr; Back to Sign In</a></div>
  </div>

  <script type="module">
    import { getSupabase } from '/js/supabase-client.js';
    const supabase = await getSupabase();

    const requestView = document.getElementById('requestView');
    const resetView   = document.getElementById('resetView');

    // Detect if this page load contains a recovery token (from email link)
    supabase.auth.onAuthStateChange((event) => {
      if (event === 'PASSWORD_RECOVERY') {
        requestView.classList.add('hidden');
        resetView.classList.remove('hidden');
      }
    });

    // ── Request reset ────────────────────────────────────────────────
    const reqForm  = document.getElementById('requestForm');
    const reqAlert = document.getElementById('reqAlert');
    const reqBtn   = document.getElementById('reqBtn');

    function showReqAlert(msg, type = 'error') {
      reqAlert.textContent = msg;
      reqAlert.className = `alert alert-${type}`;
    }

    reqForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('reqEmail').value.trim();
      if (!email) { showReqAlert('Please enter your email address.'); return; }

      reqBtn.disabled = true;
      reqBtn.innerHTML = '<span class="spinner"></span> Sending…';

      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: `${window.location.origin}/reset-password.html`,
      });

      if (error) {
        showReqAlert(error.message);
        reqBtn.disabled = false;
        reqBtn.textContent = 'Send Reset Link';
        return;
      }

      showReqAlert('✅ Reset link sent! Check your inbox (and spam folder).', 'success');
      reqBtn.disabled = false;
      reqBtn.textContent = 'Send Reset Link';
      reqForm.reset();
    });

    // ── Confirm new password ─────────────────────────────────────────
    const resetForm  = document.getElementById('resetForm');
    const resetAlert = document.getElementById('resetAlert');
    const resetBtn   = document.getElementById('resetBtn');

    function showResetAlert(msg, type = 'error') {
      resetAlert.textContent = msg;
      resetAlert.className = `alert alert-${type}`;
    }

    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPwd     = document.getElementById('newPwd').value;
      const confirmPwd = document.getElementById('confirmPwd').value;

      if (newPwd.length < 8) { showResetAlert('Password must be at least 8 characters.'); return; }
      if (newPwd !== confirmPwd) { showResetAlert('Passwords do not match.'); return; }

      resetBtn.disabled = true;
      resetBtn.innerHTML = '<span class="spinner"></span> Updating…';

      const { error } = await supabase.auth.updateUser({ password: newPwd });

      if (error) {
        showResetAlert(error.message);
        resetBtn.disabled = false;
        resetBtn.textContent = 'Update Password';
        return;
      }

      showResetAlert('✅ Password updated! Redirecting to sign in…', 'success');
      setTimeout(() => { window.location.href = '/login.html'; }, 2000);
    });
  </script>
</body>
</html>
