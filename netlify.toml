[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://app.cal.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; frame-src https://cal.com https://app.cal.com; connect-src 'self' https://*.supabase.co https://*.supabase.com https://*.supabase.in https://*.supabase.io https://app.cal.com https://cdn.jsdelivr.net; img-src 'self' data: https:; font-src 'self' data: https://cdnjs.cloudflare.com"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[redirects]]
  from = "/api/public-config"
  to = "/.netlify/functions/public-config"
  status = 200

[[redirects]]
  from = "/api/cal-webhook"
  to = "/.netlify/functions/cal-webhook"
  status = 200

[[redirects]]
  from = "/api/delete-account"
  to = "/.netlify/functions/delete-account"
  status = 200

[[redirects]]
  from = "/api/admin-delete-user"
  to = "/.netlify/functions/admin-delete-user"
  status = 200

[[redirects]]
  from = "/api/admin-delete-booking"
  to = "/.netlify/functions/admin-delete-booking"
  status = 200

[[redirects]]
  from = "/api/admin-invite-student"
  to = "/.netlify/functions/admin-invite-student"
  status = 200
