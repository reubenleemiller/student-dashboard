<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In – RM Tutoring</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <img src="/images/logo.png" alt="RM Tutoring" class="auth-logo-img" />
      <p>Sign in to your student portal</p>
    </div>

    <div class="card">
      <div class="card-body">
        <div id="alert" class="alert alert-error hidden"></div>

        <!-- Google sign-in -->
        <button type="button" class="btn btn-outline btn-block btn-lg" id="googleBtn">
          <i class="fa-brands fa-google" aria-hidden="true"></i>
          Continue with Google
        </button>

        <div class="divider" style="margin: 1rem 0; text-align:center; opacity:.7;">
          <span style="background: var(--card-bg, #fff); padding: 0 .75rem;">or</span>
        </div>

        <form id="loginForm" novalidate>
          <div class="form-group">
            <label for="email">Email address</label>
            <input id="email" type="email" class="form-input" placeholder="you@example.com" required autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input id="password" type="password" class="form-input" placeholder="••••••••" required autocomplete="current-password" />
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">
            Sign In
          </button>
        </form>
      </div>
    </div>

    <div class="auth-links">
      <a href="/reset-password.html">Forgot your password?</a>
      &nbsp;·&nbsp;
      <a href="/signup.html">Create an account</a>
    </div>
  </div>

  <script type="module">
    import { getSupabase }                    from '/js/supabase-client.js';
    import { requireNotAuth, setBtnLoading }  from '/js/auth.js';

    const supabase = await getSupabase();

    const ADMIN_EMAIL = 'reuben.miller@rmtutoringservices.com';

    await requireNotAuth();

    const form      = document.getElementById('loginForm');
    const alertBox  = document.getElementById('alert');
    const submitBtn = document.getElementById('submitBtn');
    const googleBtn = document.getElementById('googleBtn');

    function showAlert(msg) {
      alertBox.textContent = msg;
      alertBox.classList.remove('hidden');
    }
    function hideAlert() { alertBox.classList.add('hidden'); }

    function routeByEmail(email) {
      window.location.href = email === ADMIN_EMAIL
        ? '/admin.html'
        : '/dashboard.html';
    }

    // Google OAuth
    googleBtn.addEventListener('click', async () => {
      hideAlert();
      setBtnLoading(googleBtn, true, 'Redirecting…');

      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          // After Google -> Supabase callback, send back here; we will route based on ADMIN_EMAIL.
          redirectTo: `${window.location.origin}/login.html`,
        },
      });

      if (error) {
        showAlert(error.message);
        setBtnLoading(googleBtn, false);
      }
      // On success the browser redirects; no further code runs here.
    });

    // Email/password login
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showAlert('Please enter your email and password.');
        return;
      }

      setBtnLoading(submitBtn, true, 'Signing in…');

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        showAlert(error.message);
        setBtnLoading(submitBtn, false);
        return;
      }

      routeByEmail(data.user.email);
    });

    // If we returned from OAuth, there may already be a session here.
    // Supabase parses the OAuth tokens from the URL automatically.
    const { data: sessionData } = await supabase.auth.getSession();
    if (sessionData?.session?.user?.email) {
      routeByEmail(sessionData.session.user.email);
    }
  </script>
</body>
</html>
